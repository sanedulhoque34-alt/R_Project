<!DOCTYPE html>
<html>
<head>
    <title>My Product Store</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>🛒 My Online Store</h1>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/250">
        <h2>Product 1</h2>
        <p>Price: ₹499</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250">
        <h2>Product 2</h2>
        <p>Price: ₹799</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250">
        <h2>Product 3</h2>
        <p>Price: ₹999</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
