<!DOCTYPE html>
<html>
<head>
    <title>My Product Store</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Store</h1>

    <div class="card">
        <h2>My Product</h2>
        <p>Best product for you</p>
        <button>Buy Now</button>
    </div>

</body>
</html>
